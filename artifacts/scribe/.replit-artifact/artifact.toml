kind = "mobile"
previewPath = "/"
title = "Scribe — Writer"
version = "1.0.0"
id = "artifacts/scribe"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25603

[services.development]
run = "pnpm --filter @workspace/scribe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scribe", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/scribe", "run", "serve" ]

[services.env]
PORT = "25603"
BASE_PATH = "/"
